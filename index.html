<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>My Sign-up Form</title>
</head>
<body>
    <div class="left-section">
        <img>
    </div>
    <div class="right-section">
        <form>
            <p>This is going to be the title of the form</p>
            <div class="form">
                <p>
                    Let's get into it!
                </p>
                <div class="form-row">
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="user_first_name">
                    <label for="lname">Last Name:</label>
                    <input type="text" id="lname" name="user_last_name">
                </div>
                <div class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="user_email">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="user_phone_num">
                </div>
                <div class="form-row">
                    <label for="pswd">Password:</label>
                    <input type="password" id="pswd" name="user_password">
                    <label for="confirm-pswd">Confirm Password:</label>
                    <input type="password" id="confirm-pswd" name="user__confirm_password">
                </div>
            </div>
            <div class="button">
                <button type="submit">Cofirm</button>
            </div>
            <div class="logged-in">
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>

        </form>
    </div>
</body>
</html>
