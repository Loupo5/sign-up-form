<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Hand:wght@400..700&family=Frijole&family=Geist+Pixel&display=swap" rel="stylesheet">
    <title>My Sign-up Form</title>
</head>
<body>
    <div class="left-section">
        <img src="images/kelly-sikkema-hSPVuakrJqs-unsplash.jpg" alt="snowy image">
        <div>Oonga Boonga</div>
        <p>Photo by <em>Kelly Sikkema</em> on <em>Unsplash</em></p>
    </div>
    <div class="right-section">
        <form class="form" action=# method="get">
            <p class="title">This is going to be the title of the form | blablalbalblablalbal blablalblabla blalbalbalabalbla blalbalba balablabl</p>
            <div class="main-form">
                <div class="intro">
                    Let's get into it!
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" name="user_first_name">
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" name="user_last_name">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email" class="label">Email</label>
                        <input type="email" id="email" name="user_email">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number<span>Format: xxx-xxx-xxx</span></label>
                        <input type="tel" id="phone" name="user_phone_num">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="pswd">Password</label>
                        <input type="password" id="pswd" name="user_password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-pswd">Confirm Password</label>
                        <input type="password" id="confirm-pswd" name="user__confirm_password">
                    </div>
                </div>
            </div>
            <div class="button">
                <button type="submit">Cofirm</button>
            </div>
            <div class="logged-in">
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>

        </form>
    </div>
</body>
</html>
